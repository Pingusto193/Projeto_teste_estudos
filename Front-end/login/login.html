<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- Configurações básicas da página e adaptação para celulares. -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#14213d">
  <meta name="description" content="Entre na sua conta para organizar seus estudos e manter sua sequência diária.">

  <!-- Ícone exibido na aba do navegador. -->
  <link rel="icon" type="image/png" href="../Fotos/86339240-b0dc-45f5-89c9-55a1a69593fa.png">
  <title>Flinxgu — Entrar</title>

  <!-- Arquivo que controla todo o visual desta página. -->
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <!-- Área principal: centraliza a caixa de login na tela. -->
  <main class="login-page">
    <!-- Cartão branco que envolve o formulário. -->
    <section class="login-card" aria-labelledby="login-title">
      <div class="form-panel">
        <!-- Título da caixa de login. -->
        <header class="form-header">
          <h1 id="login-title">Login</h1>
        </header>

        <!-- Formulário enviado quando o usuário pressiona o botão Entrar. -->
        <form class="login-form" action="#" method="post" novalidate>
          <!-- Campo de e-mail. -->
          <div class="form-group">
            <label for="email">E-mail</label>
            <div class="input-wrapper">
              <svg viewBox="0 0 24 25" aria-hidden="true">
                <path d="M4 6.5h16v11H4z"/>
                <path d="m4.5 7 7.5 6 7.5-6"/>
              </svg>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="seuemail@exemplo.com"
                autocomplete="email"
                inputmode="email"
                autocapitalize="off"
                autocorrect="off"
                spellcheck="false"
                aria-describedby="email-error"
                required
              >
            </div>
            <small class="field-error" id="email-error">Digite um endereço de e-mail válido.</small>
          </div>

          <!-- Campo de senha e botão para mostrar ou esconder a senha. -->
          <div class="form-group">
            <div class="label-row">
              <label for="senha">Senha</label>
              <a class="forgot-link" href="#">Esqueci minha senha</a>
            </div>
            <div class="input-wrapper password-wrapper">
              <svg class="input-icon" viewBox="0 0 24 24" aria-hidden="true">
                <rect x="5" y="10" width="14" height="10" rx="2"/>
                <path d="M8 10V7a4 4 0 0 1 8 0v3"/>
              </svg>
              <input type="password" id="senha" name="senha" placeholder="Digite sua senha" autocomplete="current-password" minlength="6" aria-describedby="senha-error" required>
              <button class="password-toggle" type="button" aria-label="Mostrar senha" aria-pressed="false" aria-controls="senha">
                <svg class="eye-open" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"/>
                  <circle cx="12" cy="12" r="2.5"/>
                </svg>
                <svg class="eye-closed" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4.2 4.2 19.8 19.8"/>
                  <path d="M9.9 5.5c.7-.13 1.4-.2 2.1-.2 6 0 9.5 6.2 9.5 6.2a15.7 15.7 0 0 1-2.8 3.6M6.9 6.9C4.2 8.6 2.5 11.5 2.5 11.5s3.5 6.2 9.5 6.2c1.2 0 2.3-.2 3.3-.6"/>
                  <path d="M9.9 9.9a2.5 2.5 0 0 0 3.6 3.6"/>
                </svg>
              </button>
            </div>
            <small class="field-error" id="senha-error">A senha deve ter pelo menos 6 caracteres.</small>
          </div>

          <!-- Botão principal do formulário. -->
          <button class="login-button" type="submit">
            <span class="button-content">
              <span>Entrar</span>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 12h14M14 7l5 5-5 5"/>
              </svg>
            </span>
            <span class="button-spinner" aria-hidden="true"></span>
            <span class="button-success" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="m5 12.5 4.2 4.2L19 7"/>
              </svg>
            </span>
          </button>

          <!-- Espaço reservado para mensagens de erro do formulário. -->
          <p class="form-message" role="alert" aria-live="polite"></p>

          <!-- Aviso exibido somente quando o JavaScript está desativado. -->
          <noscript>
            <p class="form-message" role="alert">Ative o JavaScript no navegador para entrar.</p>
          </noscript>
        </form>

        <!-- Atalho para quem ainda precisa criar uma conta. -->
        <div class="signup-action">
          <span>Ainda não tem uma conta?</span>
          <a class="signup-button" href="../Sign%20Up/sign_up.html">Criar conta</a>
        </div>
      </div>
    </section>
  </main>

  <!-- Comportamentos da tela, como validação e exibição da senha. -->
  <script src="login.js" defer></script>
</body>
</html>
